<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AuMigo - Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="src/styles/login.css">
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    
    <div class="card p-4 col-md-6">
        
        <div class="text-center">
            <img src="logo.png" class="logo">
            <h2 class="title">Cadastro AuMigo 🐾</h2>
            <p>Adote amor, adote um amigo ❤️</p>
        </div>

        <form>

            <div class="mb-3">
                <label>Nome completo</label>
                <input type="text" class="form-control" placeholder="Digite seu nome">
            </div>

            <div class="mb-3">
                <label>Endereço</label>
                <input type="text" class="form-control" placeholder="Digite seu endereço">
            </div>

            <div class="mb-3">
                <label>Telefone</label>
                <input type="text" class="form-control" placeholder="(00) 00000-0000">
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email" class="form-control" placeholder="seuemail@gmail.com">
            </div>

            <div class="mb-3">
                <label>CPF</label>
                <input type="text" class="form-control" placeholder="000.000.000-00">
            </div>

            <div class="mb-3">
                <label>Senha</label>
                <input type="password" class="form-control" placeholder="Crie uma senha">
            </div>

            <button type="submit" class="btn btn-custom w-100">
                Criar Conta
            </button>

            <div class="text-center mt-3">
                <small>Já tem conta? <a href="entrar.html">Entrar</a></small>
            </div>

        </form>

    </div>

</div>

</body>
</html>
