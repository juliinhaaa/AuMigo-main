<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuMigo - Entrar</title>
    <link rel="stylesheet" href="src/styles/entrar.css">
</head>
<body>

    <div class="entrar-container">
        <div class="entrar-box">
            <img src="logo.png" alt="Logo AuMigo" class="logo">

            <h1>Entrar no AuMigo 🐾</h1>
            <p>Que bom te ver de volta</p>

            <form>
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Digite seu email" required>

                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha" required>

                <button type="submit">Entrar</button>
            </form>

            <div class="links">
                <a href="#">Esqueceu a senha?</a>
            </div>

            <p class="cadastro-link">
                Não tem conta?
                <a href="login.html">Cadastre-se</a>
            </p>
        </div>
    </div>

</body>
</html>
